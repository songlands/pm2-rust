# PM2 YAML 配置文件示例 - 集群模式
# 使用 YAML 格式定义集群模式的应用

apps:
  # 集群模式 API 服务器
  - name: api-cluster
    script: examples/node-server/app.js
    instances: 4
    exec_mode: cluster
    max_memory_restart: 1G
    log_file: ./logs/api-cluster.log
    error_file: ./logs/api-cluster-error.log
    cwd: .
    autorestart: true
    max_restarts: 10
    env:
      NODE_ENV: production
      PORT: "3005"
      HOST: 0.0.0.0

  # 集群模式 Web 服务器
  - name: web-cluster
    script: examples/node-server/app.js
    instances: 2
    exec_mode: cluster
    max_memory_restart: 500M
    log_file: ./logs/web-cluster.log
    error_file: ./logs/web-cluster-error.log
    cwd: .
    autorestart: true
    max_restarts: 10
    env:
      NODE_ENV: production
      PORT: "3006"
      HOST: 0.0.0.0
