# PM2 YAML 配置文件示例 - 单个应用
# 基础配置
name: http-server
script: examples/node-server/app.js
instances: 1
exec_mode: fork
watch: false
max_memory_restart: 500M
log_file: ./logs/http-server.log
error_file: ./logs/http-server-error.log
cwd: .
autorestart: true
max_restarts: 15

# 环境变量
env:
  NODE_ENV: production
  PORT: "3002"
  HOST: 0.0.0.0
